project:
  type: book

book:
  title: "[Information and Communication Technologies for Library and Information Science: Foundations, Systems, and Services](https://dddorado.github.io/ict-textbook/)"
  author: "Dan Anthony Dorado"
  date: "2026-06-18"
  date-format: long
  cover-image: Cover.png
  license: "CC BY-NC-SA 4.0"
  output-file: ict-textbook
  search: true
  repo-url: https://github.com/dddorado/ict-textbook
  downloads: [pdf, epub]
  sharing: [twitter, facebook]
  page-footer:
    left: "Except where otherwise noted, this work is licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)."
    right:
      - icon: github
        href: https://github.com/dddorado/ict-textbook
        aria-label: GitHub repository
      - text: DanDorado.net
        href: http://dandorado.net
  chapters:
    - index.qmd
    - disclaimer.qmd
    - preface.qmd
    - outline.qmd
    - introductory-ict-lis.qmd
    - chapter-02-networking-web.qmd
    - chapter-03-databases.qmd
    - chapter-04-metadata-cataloguing.qmd
    - chapter-05-digital-libraries-repositories.qmd
    - chapter-06-information-retrieval-discovery.qmd
    - chapter-07-programming-automation.qmd
    - chapter-08-apis-linked-data.qmd
    - chapter-09-ux-accessibility-mobile.qmd
    - chapter-10-digital-preservation-cloud.qmd
    - chapter-11-cybersecurity-law-project.qmd
    - chapter-12-data-literacy-capstone.qmd
    - references.qmd
    - about-author.qmd

bibliography: references.bib
link-citations: true

crossref:
  chapters: true

format:
  html:
    toc: true
    number-sections: true
    theme: cosmo
    filters:
      - clean-unnumbered-title.lua
  epub: default
  pdf:
    documentclass: scrreprt
    toc: true
    number-sections: true
    filters:
      - clean-unnumbered-title.lua
      - section-index.lua
    include-in-header:
      text: |
        \usepackage{tabularx}
        \usepackage{longtable}
        \usepackage{booktabs}
        \usepackage{makeidx}
        \usepackage{eso-pic}
        \newcolumntype{Y}{>{\raggedright\arraybackslash}X}
        \makeindex
        \AtBeginDocument{%
          \thispagestyle{empty}
          \AddToShipoutPictureBG*{%
            \AtPageLowerLeft{\includegraphics[width=\paperwidth,height=\paperheight]{Cover.png}}%
          }
          \null
          \clearpage
        }
    include-after-body:
      text: |
        \printindex
execute:
  echo: false
  warning: false
  message: false
  freeze: auto
